<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>体重记录</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 体重记录</h1>
            <p class="subtitle">坚持记录，见证改变</p>
        </div>

        <!-- Input Form -->
        <div class="card">
            <div class="card-title">✏️ 添加记录</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="dateInput">日期</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label for="weightInput">体重（kg）</label>
                    <input type="number" id="weightInput" placeholder="例：65.0" step="0.1" min="20" max="300">
                </div>
                <div class="form-group form-group-btn">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" onclick="addRecord()">➕ 记录</button>
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="card">
            <div class="card-title">📈 数据概览</div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-item">
                    <div class="stat-value" id="statCount">0</div>
                    <div class="stat-label">记录次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statCurrent">--</div>
                    <div class="stat-label">最新体重 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statAvg">--</div>
                    <div class="stat-label">平均体重 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statMin">--</div>
                    <div class="stat-label">最低 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statMax">--</div>
                    <div class="stat-label">最高 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statTrend">--</div>
                    <div class="stat-label" id="statTrendLabel">总变化</div>
                </div>
            </div>
        </div>

        <!-- Chart -->
        <div class="card">
            <div class="card-title">📉 体重趋势图</div>
            <div class="chart-wrapper">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <!-- History -->
        <div class="card">
            <div class="card-title card-title-row">
                <span>📋 历史记录</span>
                <span class="card-title-actions">
                    <button class="btn btn-ghost btn-sm" onclick="importCSV()">📤 导入CSV</button>
                    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 导出CSV</button>
                    <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑️ 清空</button>
                </span>
                <input type="file" id="csvFileInput" accept=".csv" class="hidden-file" onchange="handleCSVFile(event)">
            </div>
            <div class="table-wrap" id="tableWrap">
                <div class="empty">
                    <div class="icon">📝</div>
                    <p>暂无记录，快来添加第一条吧！</p>
                </div>
            </div>
        </div>

        <div class="footer">数据存储在浏览器本地 · 不会上传到任何服务器</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/app.js"></script>
</body>
</html>
