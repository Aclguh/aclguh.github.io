<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>体重记录</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #2c3e50;
            --sub: #7f8c8d;
            --border: #e0e4e8;
            --accent: #3498db;
            --accent-hover: #2980b9;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --success: #27ae60;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 8px 0;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
        }
        .header .subtitle {
            font-size: 14px;
            color: var(--sub);
            margin-top: 4px;
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* Form */
        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 140px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--sub);
        }
        .form-group input {
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
            background: #fafbfc;
        }
        .form-group input:focus {
            border-color: var(--accent);
            background: #fff;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-sm {
            padding: 5px 12px;
            font-size: 13px;
            border-radius: 6px;
        }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-ghost {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn-ghost:hover { background: var(--accent); color: #fff; }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }
        .stat-item {
            text-align: center;
            padding: 12px 8px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }
        .stat-label {
            font-size: 12px;
            color: var(--sub);
            margin-top: 2px;
        }
        .stat-trend-up { color: var(--danger); }
        .stat-trend-down { color: var(--success); }
        .stat-trend-flat { color: var(--sub); }

        /* Chart */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 340px;
        }
        .chart-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Table */
        .table-wrap {
            max-height: 400px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--sub);
            font-size: 13px;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:hover td { background: #f8fafc; }
        .weight-change {
            font-size: 12px;
            font-weight: 600;
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--sub);
        }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--sub);
            padding: 8px;
        }

        @media (max-width: 500px) {
            body { padding: 12px 8px; }
            .card { padding: 16px; }
            .form-row { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 8px 6px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 体重记录</h1>
            <p class="subtitle">坚持记录，见证改变</p>
        </div>

        <!-- Input Form -->
        <div class="card">
            <div class="card-title">✏️ 添加记录</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="dateInput">日期</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label for="weightInput">体重（kg）</label>
                    <input type="number" id="weightInput" placeholder="例：65.0" step="0.1" min="20" max="300">
                </div>
                <div class="form-group" style="flex:0 0 auto;">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" onclick="addRecord()">➕ 记录</button>
                </div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="card">
            <div class="card-title">📈 数据概览</div>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-item">
                    <div class="stat-value" id="statCount">0</div>
                    <div class="stat-label">记录次数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statCurrent">--</div>
                    <div class="stat-label">最新体重 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statAvg">--</div>
                    <div class="stat-label">平均体重 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statMin">--</div>
                    <div class="stat-label">最低 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statMax">--</div>
                    <div class="stat-label">最高 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statTrend">--</div>
                    <div class="stat-label" id="statTrendLabel">总变化</div>
                </div>
            </div>
        </div>

        <!-- Chart -->
        <div class="card">
            <div class="card-title">📉 体重趋势图</div>
            <div class="chart-wrapper">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <!-- History -->
        <div class="card">
            <div class="card-title" style="justify-content: space-between; flex-wrap: wrap; gap: 8px;">
                <span>📋 历史记录</span>
                <span style="display:flex;gap:8px;">
                    <button class="btn btn-ghost btn-sm" onclick="importCSV()">📤 导入CSV</button>
                    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 导出CSV</button>
                    <button class="btn btn-danger btn-sm" onclick="clearAll()">🗑️ 清空</button>
                </span>
                <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="handleCSVFile(event)">
            </div>
            <div class="table-wrap" id="tableWrap">
                <div class="empty">
                    <div class="icon">📝</div>
                    <p>暂无记录，快来添加第一条吧！</p>
                </div>
            </div>
        </div>

        <div class="footer">数据存储在浏览器本地 · 不会上传到任何服务器</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const STORAGE_KEY = 'weight_records';

        // --- Data Layer ---
        function loadRecords() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch { return []; }
        }

        function saveRecords(records) {
            records.sort((a, b) => a.date.localeCompare(b.date));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        }

        // --- Toast ---
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // --- Format ---
        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return `${d.getMonth() + 1}月${d.getDate()}日`;
        }

        function getToday() {
            const d = new Date();
            return d.toISOString().slice(0, 10);
        }

        // --- Render: Stats ---
        function renderStats(records) {
            const count = records.length;
            document.getElementById('statCount').textContent = count;

            if (count === 0) {
                ['statCurrent', 'statAvg', 'statMin', 'statMax', 'statTrend'].forEach(id => {
                    document.getElementById(id).textContent = '--';
                });
                document.getElementById('statTrendLabel').textContent = '总变化';
                return;
            }

            const weights = records.map(r => r.weight);
            const latest = weights[weights.length - 1];
            const avg = weights.reduce((a, b) => a + b, 0) / count;
            const min = Math.min(...weights);
            const max = Math.max(...weights);
            const first = weights[0];
            const delta = latest - first;

            document.getElementById('statCurrent').textContent = latest.toFixed(1);
            document.getElementById('statAvg').textContent = avg.toFixed(1);
            document.getElementById('statMin').textContent = min.toFixed(1);
            document.getElementById('statMax').textContent = max.toFixed(1);

            const trendEl = document.getElementById('statTrend');
            const trendLabel = document.getElementById('statTrendLabel');
            if (delta > 0.05) {
                trendEl.textContent = `+${delta.toFixed(1)}`;
                trendEl.className = 'stat-value stat-trend-up';
                trendLabel.textContent = '累计增加';
            } else if (delta < -0.05) {
                trendEl.textContent = delta.toFixed(1);
                trendEl.className = 'stat-value stat-trend-down';
                trendLabel.textContent = '累计减少';
            } else {
                trendEl.textContent = '0.0';
                trendEl.className = 'stat-value stat-trend-flat';
                trendLabel.textContent = '基本持平';
            }
        }

        // --- Render: Chart ---
        let chartInstance = null;
        function renderChart(records) {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            if (records.length === 0) {
                // Draw empty placeholder
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: { labels: [], datasets: [] },
                    options: {
                        plugins: {
                            title: { display: true, text: '暂无数据', color: '#bdc3c7', font: { size: 18 } }
                        }
                    }
                });
                return;
            }

            const labels = records.map(r => formatDate(r.date));
            const data = records.map(r => r.weight);

            // Gradient fill
            const gradient = ctx.createLinearGradient(0, 0, 0, 340);
            gradient.addColorStop(0, 'rgba(52,152,219,0.3)');
            gradient.addColorStop(1, 'rgba(52,152,219,0.02)');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '体重 (kg)',
                        data,
                        borderColor: '#3498db',
                        backgroundColor: gradient,
                        borderWidth: 2.5,
                        pointBackgroundColor: '#3498db',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 8,
                        tension: 0.3,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#2c3e50',
                            titleFont: { size: 14 },
                            bodyFont: { size: 15, weight: '600' },
                            padding: 12,
                            cornerRadius: 8,
                            displayColors: false,
                            callbacks: {
                                label: ctx => `${ctx.parsed.y} kg`,
                            }
                        },
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 12 },
                                color: '#95a5a6',
                                maxRotation: 45,
                            }
                        },
                        y: {
                            grid: { color: '#ecf0f1' },
                            ticks: {
                                font: { size: 12 },
                                color: '#95a5a6',
                                callback: v => v + ' kg',
                            },
                            // Add some padding above/below data range
                            suggestedMin: Math.floor((Math.min(...data) - 2) / 10) * 10,
                            suggestedMax: Math.ceil((Math.max(...data) + 2) / 10) * 10,
                        }
                    }
                }
            });
        }

        // --- Render: Table ---
        function renderTable(records) {
            const wrap = document.getElementById('tableWrap');

            if (records.length === 0) {
                wrap.innerHTML = `
                    <div class="empty">
                        <div class="icon">📝</div>
                        <p>暂无记录，快来添加第一条吧！</p>
                    </div>`;
                return;
            }

            // Build rows from newest to oldest
            let html = `<table><thead><tr>
                <th>日期</th><th>体重 (kg)</th><th>变化</th><th style="width:80px;">操作</th>
            </tr></thead><tbody>`;

            for (let i = records.length - 1; i >= 0; i--) {
                const r = records[i];
                let changeHtml = '<span style="color:#bdc3c7;">—</span>';
                if (i > 0) {
                    const prev = records[i - 1].weight;
                    const diff = r.weight - prev;
                    if (Math.abs(diff) < 0.05) {
                        changeHtml = '<span class="weight-change" style="color:#95a5a6;">→ 0.0</span>';
                    } else if (diff > 0) {
                        changeHtml = `<span class="weight-change" style="color:#e74c3c;">↑ +${diff.toFixed(1)}</span>`;
                    } else {
                        changeHtml = `<span class="weight-change" style="color:#27ae60;">↓ ${diff.toFixed(1)}</span>`;
                    }
                }

                const dateDisplay = new Date(r.date + 'T00:00:00').toLocaleDateString('zh-CN', {
                    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
                });

                html += `<tr>
                    <td>${dateDisplay}</td>
                    <td style="font-weight:600;">${r.weight.toFixed(1)}</td>
                    <td>${changeHtml}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.id}')" title="删除">✕</button>
                    </td>
                </tr>`;
            }

            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        // --- Render All ---
        function renderAll() {
            const records = loadRecords();
            renderStats(records);
            renderChart(records);
            renderTable(records);
        }

        // --- Actions ---
        function addRecord() {
            const dateInput = document.getElementById('dateInput');
            const weightInput = document.getElementById('weightInput');
            const date = dateInput.value;
            const weight = parseFloat(weightInput.value);

            if (!date) { showToast('⚠️ 请选择日期'); return; }
            if (isNaN(weight) || weight < 20 || weight > 300) {
                showToast('⚠️ 请输入有效体重（20-300 kg）'); return;
            }

            const records = loadRecords();
            const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

            // If same date exists, replace it (one record per day)
            const existingIdx = records.findIndex(r => r.date === date);
            if (existingIdx >= 0) {
                records[existingIdx].weight = weight;
                showToast('✅ 已更新当天记录');
            } else {
                records.push({ id, date, weight });
                showToast('✅ 记录已添加');
            }

            saveRecords(records);
            weightInput.value = '';
            dateInput.value = getToday();
            renderAll();
        }

        function deleteRecord(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            let records = loadRecords();
            records = records.filter(r => r.id !== id);
            saveRecords(records);
            showToast('🗑️ 记录已删除');
            renderAll();
        }

        function clearAll() {
            if (!confirm('确定要清空全部记录吗？此操作不可恢复。')) return;
            localStorage.removeItem(STORAGE_KEY);
            showToast('🗑️ 全部记录已清空');
            renderAll();
        }

        function exportCSV() {
            const records = loadRecords();
            if (records.length === 0) {
                showToast('⚠️ 暂无数据可导出');
                return;
            }

            let csv = '日期,体重(kg)\n';
            records.forEach(r => {
                csv += `${r.date},${r.weight.toFixed(1)}\n`;
            });

            const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `体重记录_${getToday()}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('📥 导出成功');
        }

        function importCSV() {
            document.getElementById('csvFileInput').click();
        }

        function handleCSVFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                let text = e.target.result;

                // Strip BOM if present
                if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

                const lines = text.split(/\r?\n/).filter(line => line.trim());
                if (lines.length < 2) {
                    showToast('⚠️ CSV 文件格式不正确或为空');
                    return;
                }

                // Detect header: first line should contain "日期" or "date"
                let startIdx = 0;
                const firstLine = lines[0].trim();
                if (firstLine.includes('日期') || firstLine.toLowerCase().includes('date')) {
                    startIdx = 1;
                }

                const records = loadRecords();
                const existingMap = new Map(records.map(r => [r.date, r]));
                let added = 0, updated = 0, skipped = 0;

                for (let i = startIdx; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    // Support both comma and tab separators
                    const parts = line.includes('\t') ? line.split('\t') : line.split(',');
                    if (parts.length < 2) { skipped++; continue; }

                    const date = parts[0].trim();
                    const weight = parseFloat(parts[1].trim());

                    // Validate
                    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { skipped++; continue; }
                    if (isNaN(weight) || weight < 20 || weight > 300) { skipped++; continue; }

                    if (existingMap.has(date)) {
                        existingMap.get(date).weight = weight;
                        updated++;
                    } else {
                        const id = 'imp_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6) + '_' + i;
                        records.push({ id, date, weight });
                        existingMap.set(date, records[records.length - 1]);
                        added++;
                    }
                }

                saveRecords(records);
                const parts = [];
                if (added > 0) parts.push(`新增 ${added} 条`);
                if (updated > 0) parts.push(`更新 ${updated} 条`);
                if (skipped > 0) parts.push(`跳过 ${skipped} 条`);
                showToast(parts.length > 0 ? '📤 导入完成：' + parts.join('，') : '⚠️ 没有有效数据可导入');
                renderAll();
            };

            reader.readAsText(file, 'UTF-8');
            // Reset input so the same file can be re-imported
            event.target.value = '';
        }

        // --- Init ---
        document.getElementById('dateInput').value = getToday();

        // Listen for Enter key on weight input
        document.getElementById('weightInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addRecord();
        });

        // Keyboard shortcut: Ctrl+S to add
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                document.getElementById('weightInput').focus();
            }
        });

        renderAll();
    </script>
</body>
</html>
